services:
  prayer-times:
    build:
      context: .
      dockerfile: Dockerfile
    image: prayer-times:latest
    container_name: prayer-times
    restart: unless-stopped
    # Bind only to localhost; the host's nginx is the public entry point.
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
